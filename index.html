<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Canopy | Esther Grace Kimotho</title>
    
    <meta name="description" content="Wild Canopy by Esther Grace Kimotho — Romantic psychological fiction exploring love, obsession, vulnerability, and the psychology of connection.">
    <meta name="keywords" content="Esther Grace Kimotho, Romantic Fiction Author, Psychological Fiction, Love Stories, Wild Canopy">
    <meta name="author" content="Esther Grace Kimotho">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">

    <style>
        @media (max-width: 768px) {
            .hero {
                height: auto !important;
                min-height: 100vh !important;
                padding-top: 150px !important;
                padding-bottom: 80px !important;
                justify-content: flex-start !important;
            }
            .hero-headline {
                font-size: 2rem !important; /* Forces the text to shrink */
                line-height: 1.3 !important;
                margin-bottom: 20px !important;
                padding: 0 10px !important;
            }
            .brand-positioning {
                font-size: 1.05rem !important;
                margin-bottom: 40px !important;
                padding: 0 10px !important;
            }
            .hero-buttons {
                flex-direction: column !important;
                width: 100% !important;
                padding: 0 20px !important;
                gap: 15px !important;
            }
            .hero-btn {
                width: 100% !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <div class="nav-brand">
        <a href="index.html">
            <img src="WClogo.png" alt="Wild Canopy Logo" class="nav-logo">
        </a>
    </div>
    
    <div class="menu-toggle" id="mobile-menu">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="links" id="nav-links">
        <a href="index.html" style="font-weight: bold; border-bottom: 1px solid var(--accent-light);">Home</a>
        <a href="books.html">Books</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<header class="hero">
    <h1 class="hero-headline reveal">
        It doesn’t start with a spark.<br>
        It starts with a slow unraveling.
    </h1>

    <p class="brand-positioning reveal delay-1">
        Romantic psychological fiction exploring love, obsession, vulnerability, and the spaces between words.
    </p>

    <div class="hero-buttons reveal delay-2">
        <a href="books.html" class="hero-btn primary-btn">Explore the Books</a>
        <a href="about.html" class="hero-btn secondary-btn">Meet the Author</a>
    </div>
</header>

<footer style="width: 100%; position: relative; z-index: 10;"><p>© 2026 Esther Grace Kimotho. All rights reserved.</p></footer>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('nav .links');

    if(menuToggle) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = menuToggle.querySelector('i');
            if(navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });
    }

    if(navLinks) {
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                if (navLinks.classList.contains('active')) {
                    navLinks.classList.remove('active');
                    const icon = menuToggle.querySelector('i');
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                }
            });
        });
    }

    window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if(nav) {
            nav.classList.toggle('scrolled', window.scrollY > 50);
        }
    });

    document.addEventListener("DOMContentLoaded", function() {
        const reveals = document.querySelectorAll(".reveal");
        const observer = new IntersectionObserver(entries => { 
            entries.forEach(entry => { 
                if (entry.isIntersecting) entry.target.classList.add("active"); 
            }); 
        }, { threshold: 0.15 });
        reveals.forEach(reveal => observer.observe(reveal));
    });
</script>

</body>
</html>
